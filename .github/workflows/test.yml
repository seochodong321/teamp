name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 순수 로직 단위 테스트 — 빠르고 의존성 없음
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # Firestore 보안 규칙 테스트 — 에뮬레이터 필요 (firebase-tools는 Java 21+ 요구)
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules
