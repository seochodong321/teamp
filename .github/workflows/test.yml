name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 순수 로직 단위 테스트 — 빠르고 의존성 없음
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # Firestore 보안 규칙 테스트 — 에뮬레이터(Java) 필요
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npm install -g firebase-tools
      - name: test:rules (실패 시 에러 annotation)
        shell: bash
        run: |
          set +e
          npm run test:rules 2>&1 | tee /tmp/r.log
          code=${PIPESTATUS[0]}
          [ "$code" = "0" ] && exit 0
          tail -30 /tmp/r.log | while IFS= read -r l; do echo "::error::$l"; done
          exit "$code"
