name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 순수 로직 단위 테스트 — 빠르고 의존성 없음
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: npm ci (실패 시 에러를 annotation으로)
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund 2>&1 | tee /tmp/npmci.log
          code=${PIPESTATUS[0]}
          [ "$code" = "0" ] && exit 0
          tail -15 /tmp/npmci.log | while IFS= read -r l; do echo "::error::npm ci: $l"; done
          exit "$code"
      - run: npm test

  # Firestore 보안 규칙 테스트 — 에뮬레이터(Java) 필요
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: npm ci (실패 시 에러를 annotation으로)
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund 2>&1 | tee /tmp/npmci.log
          code=${PIPESTATUS[0]}
          [ "$code" = "0" ] && exit 0
          tail -15 /tmp/npmci.log | while IFS= read -r l; do echo "::error::npm ci: $l"; done
          exit "$code"
      - run: npm install -g firebase-tools
      - run: npm run test:rules
