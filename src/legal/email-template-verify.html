<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background:#F4F3FF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F4F3FF;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;width:100%;">

          <!-- 헤더: 브랜드 -->
          <tr>
            <td align="center" style="background:linear-gradient(150deg,#3C3489 0%,#534AB7 50%,#7B6FD4 100%);border-radius:16px 16px 0 0;padding:36px 40px 32px;">
              <!-- 로고 텍스트 (이미지 없이) -->
              <div style="display:inline-block;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;padding:10px 20px;margin-bottom:20px;">
                <span style="font-size:22px;font-weight:800;color:#FFFFFF;letter-spacing:-0.5px;">TEAMP</span>
              </div>
              <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.08em;font-weight:500;">기여와 관계의 기록</p>
            </td>
          </tr>

          <!-- 봉투 아이콘 구분선 -->
          <tr>
            <td align="center" style="background:#FFFFFF;padding:0;">
              <div style="margin-top:-1px;background:linear-gradient(150deg,#3C3489 0%,#534AB7 50%,#7B6FD4 100%);height:3px;"></div>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="background:#FFFFFF;padding:40px 40px 32px;border-left:1px solid #E8E6F9;border-right:1px solid #E8E6F9;">

              <!-- 아이콘 -->
              <div style="text-align:center;margin-bottom:24px;">
                <div style="display:inline-block;width:56px;height:56px;background:#F4F3FF;border-radius:16px;line-height:56px;font-size:28px;">✉️</div>
              </div>

              <!-- 제목 -->
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:800;color:#1A1450;text-align:center;letter-spacing:-0.5px;">
                이메일 인증을 완료해주세요
              </h1>

              <!-- 설명 -->
              <p style="margin:0 0 28px;font-size:15px;color:#6B6B8A;line-height:1.8;text-align:center;">
                안녕하세요! 팀프에 가입해주셔서 감사해요.<br />
                아래 버튼을 눌러 이메일 인증을 완료하면<br />
                바로 팀프를 시작할 수 있어요.
              </h1>

              <!-- CTA 버튼 -->
              <div style="text-align:center;margin-bottom:32px;">
                <a href="%LINK%"
                   style="display:inline-block;background:linear-gradient(135deg,#534AB7 0%,#7B6FD4 100%);color:#FFFFFF;font-size:16px;font-weight:700;text-decoration:none;padding:15px 40px;border-radius:12px;letter-spacing:-0.2px;box-shadow:0 4px 16px rgba(83,74,183,0.35);">
                  이메일 인증하기 →
                </a>
              </div>

              <!-- 구분선 -->
              <hr style="border:none;border-top:1px solid #EEECFB;margin:0 0 24px;" />

              <!-- 보조 안내 -->
              <p style="margin:0 0 12px;font-size:13px;color:#9B99B8;line-height:1.7;text-align:center;">
                버튼이 작동하지 않으면 아래 링크를 복사해서 브라우저에 붙여넣어 주세요.
              </p>
              <p style="margin:0;font-size:12px;color:#B8B6D4;word-break:break-all;text-align:center;line-height:1.6;">
                %LINK%
              </p>

            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td style="background:#F9F8FF;border:1px solid #E8E6F9;border-top:none;border-radius:0 0 16px 16px;padding:24px 40px;">
              <p style="margin:0 0 8px;font-size:12px;color:#B8B6D4;text-align:center;line-height:1.7;">
                이 메일은 <strong style="color:#9B99B8;">%EMAIL%</strong> 주소로 발송되었습니다.<br />
                본인이 가입을 요청하지 않았다면 이 메일을 무시해주세요.
              </p>
              <p style="margin:12px 0 0;font-size:11px;color:#C8C6DE;text-align:center;">
                © 2026 Teamp · 기여와 관계의 기록
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
