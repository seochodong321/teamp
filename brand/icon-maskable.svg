<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Teamp — App icon (maskable, safe-zone fitted)</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;display=swap');.wm{font-family:'Luckiest Guy','Arial Black',sans-serif;font-size:200px;text-anchor:middle;letter-spacing:-2px;}</style>
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D2580"></stop>
      <stop offset="0.55" stop-color="#534AB7"></stop>
      <stop offset="1" stop-color="#7C6FDE"></stop>
    </linearGradient>
    <radialGradient id="hl" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(72 72) rotate(45) scale(320)">
      <stop offset="0" stop-color="#9A8FF0" stop-opacity="0.4"></stop>
      <stop offset="1" stop-color="#9A8FF0" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <rect width="512" height="512" fill="url(#bg)"></rect>
  <rect width="512" height="512" fill="url(#hl)"></rect>

  
  <g transform="translate(256 300) scale(0.55)">
