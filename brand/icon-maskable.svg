      <text class="wm" x="3.2" y="3.2" fill="#1A1450">TEAMP</text>
      <text class="wm" x="1.6" y="1.6" fill="#1A1450">TEAMP</text>
      <text class="wm" x="0" y="0" fill="none" stroke="#B8AEF7" stroke-width="26" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke">TEAMP</text>
      <text class="wm" x="0" y="0" fill="#FFFFFF" stroke="#1A1450" stroke-width="11" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke">TEAMP</text>
    </g>
    <g fill="#1A1450">
      <rect x="-250" y="38" width="30" height="8" rx="4" transform="rotate(-6 -235 42)"></rect>
      <rect x="-218" y="50" width="18" height="7" rx="3.5" transform="rotate(-6 -209 53.5)"></rect>
