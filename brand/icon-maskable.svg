      <rect x="100" y="54" width="16" height="7" rx="3.5" transform="rotate(-2 108 57.5)"></rect>
      <rect x="188" y="44" width="26" height="8" rx="4" transform="rotate(1 201 48)"></rect>
      <rect x="222" y="56" width="18" height="7" rx="3.5" transform="rotate(1 231 59.5)"></rect>
    </g>
